<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7FB069" />
    <title>FreshTable - 오프라인</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Pretendard, Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #fafafa 0%, #f4f8f1 100%);
        color: #0f172a;
        padding: 24px;
      }
      .card {
        width: min(100%, 480px);
        background: rgba(255,255,255,0.96);
        border: 1px solid #e7ece3;
        border-radius: 28px;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        padding: 28px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
      }
      .badge {
        width: 56px;
        height: 56px;
        border-radius: 18px;
        background: #7fb069;
        display: grid;
        place-items: center;
        color: white;
        font-size: 24px;
        font-weight: 800;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        line-height: 1.7;
        color: #475569;
      }
      .hint {
        margin-top: 18px;
        border-radius: 18px;
        background: #fff8db;
        border: 1px solid #f7e3a2;
        padding: 14px 16px;
        color: #7c5a07;
        font-size: 14px;
      }
      button {
        margin-top: 22px;
        width: 100%;
        border: 0;
        border-radius: 18px;
        background: #7fb069;
        color: white;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="brand">
        <div class="badge">FT</div>
        <div>
          <h1>오프라인 모드입니다</h1>
        </div>
      </div>
      <p>네트워크 연결이 잠시 끊겼어요. 최근에 열어본 페이지와 캐시된 리소스는 계속 사용할 수 있고, 연결이 복구되면 최신 데이터가 자동으로 반영됩니다.</p>
      <div class="hint">팁: 홈 화면에 추가해 두면 앱처럼 더 빠르게 실행할 수 있어요.</div>
      <button type="button" onclick="window.location.reload()">다시 시도</button>
    </main>
  </body>
</html>
